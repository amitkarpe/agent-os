<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#0b0f14">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <title>{% if page.title and page.title != site.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>
    <header class="site-header">
      <nav class="site-shell site-nav" aria-label="Primary navigation">
        <a class="site-name" href="{{ '/' | relative_url }}">Agent OS</a>
        <div class="site-links">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/kb/' | relative_url }}">Knowledge base</a>
        </div>
      </nav>
    </header>
    <main id="content" class="site-shell content">
      {{ content }}
    </main>
  </body>
</html>
